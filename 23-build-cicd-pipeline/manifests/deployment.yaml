apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cicd-demo

  template:
    metadata:
      labels:
        app: cicd-demo

    spec:
      containers:
      - name: cicd-demo
        image: 181640953339.dkr.ecr.us-east-1.amazonaws.com/cicd-demo:v1

        ports:
        - containerPort: 5000
