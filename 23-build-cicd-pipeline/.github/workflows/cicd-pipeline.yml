name: CI-CD-Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        cd app
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        cd app
        pytest

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        severity: CRITICAL,HIGH
        exit-code: 1

  docker-build:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: |
        cd app
        docker build -t cicd-demo:v1 .
