apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-autoscaler
  namespace: kube-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: cluster-autoscaler

  template:
    metadata:
      labels:
        app: cluster-autoscaler

    spec:
      serviceAccountName: cluster-autoscaler

      containers:
      - image: registry.k8s.io/autoscaling/cluster-autoscaler:v1.34.0
        name: cluster-autoscaler

        command:
        - ./cluster-autoscaler
        - --v=4
        - --stderrthreshold=info
        - --cloud-provider=aws
        - --skip-nodes-with-local-storage=false
        - --expander=least-waste
        - --nodes=3:6:eks-workers-cacf72d6-7da5-b0ea-0990-4eee7d639ea7managed

        resources:
          limits:
            cpu: 100m
            memory: 300Mi
          requests:
            cpu: 100m
            memory: 300Mi
