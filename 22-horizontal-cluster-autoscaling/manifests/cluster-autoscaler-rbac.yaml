apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-autoscaler

rules:
- apiGroups: [""]
  resources:
  - events
  - endpoints
  - pods/eviction
  - pods/status
  - nodes
  - pods
  - services
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete

- apiGroups: [""]
  resources:
  - configmaps
  verbs:
  - create
  - list
  - watch
  - update
  - get

- apiGroups: [""]
  resources:
  - configmaps/status
  verbs:
  - update

- apiGroups: [""]
  resources:
  - namespaces
  - persistentvolumes
  - persistentvolumeclaims
  verbs:
  - list
  - watch

- apiGroups: ["apps"]
  resources:
  - daemonsets
  - replicasets
  - statefulsets
  verbs:
  - list
  - watch

- apiGroups: ["batch"]
  resources:
  - jobs
  verbs:
  - list
  - watch

- apiGroups: ["storage.k8s.io"]
  resources:
  - storageclasses
  - csinodes
  verbs:
  - watch
  - list
- apiGroups: ["coordination.k8s.io"]
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-autoscaler

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-autoscaler

subjects:
- kind: ServiceAccount
  name: cluster-autoscaler
  namespace: kube-system
