apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}

  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}

    spec:
      containers:
      - name: nginx

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 80

        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}-config
              key: APP_ENV

        - name: USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Chart.Name }}-secret
              key: username

        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Chart.Name }}-secret
              key: password

        resources:
{{ toYaml .Values.resources | indent 10 }}
